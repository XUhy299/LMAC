name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:

    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' 

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
 
        pip install torch==2.1.1+cpu -f https://download.pytorch.org/whl/torch_stable.html
        
        pip install -r requirements.txt
        
        pip install pytest pytest-asyncio black isort flake8 mypy

    - name: Lint with flake8
      run: |
        flake8 agentic_rag --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 agentic_rag --count --exit-zero --max-complexity=10 --max-line-length=100 --statistics

    - name: Format check with black
      run: |
        black --check --diff agentic_rag

    - name: Import sort check with isort
      run: |
        isort --check-only --diff agentic_rag

    - name: Type check with mypy
      run: |
        mypy agentic_rag --ignore-missing-imports

    - name: Test with pytest
      run: |
        pytest tests/ -v --tb=short
      env:
        MOCK_LLM: true